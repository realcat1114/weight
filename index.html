<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業版體重追蹤 APP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqjGj7I-ZqDQfeayB-MjdG3XVJgoUOInI",
            authDomain: "weight-byrealcat.firebaseapp.com",
            projectId: "weight-byrealcat",
            storageBucket: "weight-byrealcat.firebasestorage.app",
            messagingSenderId: "922031190428",
            appId: "1:922031190428:web:e7cee391951b5d5e091859",
            measurementId: "G-E6V3XJQXXW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let chartInstance = null;
        let unsubscribe = null; // 用來切換用戶時清除監聽

        // --- 登入邏輯 ---
        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        // 監聽登入狀態改變
        onAuthStateChanged(auth, (user) => {
            const loginSection = document.getElementById('loginSection');
            const appSection = document.getElementById('appSection');
            const userNameDisplay = document.getElementById('userName');

            if (user) {
                // 已登入
                loginSection.style.display = 'none';
                appSection.style.display = 'block';
                userNameDisplay.innerText = `你好，${user.displayName}`;
                startDataSync(user.uid);
            } else {
                // 已登出
                loginSection.style.display = 'block';
                appSection.style.display = 'none';
                if (unsubscribe) unsubscribe();
            }
        });

        // --- 資料同步 (只撈取當前用戶的資料) ---
        function startDataSync(uid) {
            const q = query(
                collection(db, "weights"), 
                where("uid", "==", uid), // 關鍵：只抓自己的
                orderBy("date", "asc")
            );

            unsubscribe = onSnapshot(q, (snapshot) => {
                const weights = [];
                snapshot.forEach((doc) => weights.push(doc.data()));
                updateChart(weights);
            });
        }

        // --- 新增資料 ---
        window.addWeight = async function() {
            const user = auth.currentUser;
            const date = document.getElementById('dateInput').value;
            const weight = parseFloat(document.getElementById('weightInput').value);

            if (user && date && !isNaN(weight)) {
                await addDoc(collection(db, "weights"), {
                    uid: user.uid, // 存入用戶 ID
                    date,
                    weight,
                    createdAt: new Date()
                });
                document.getElementById('weightInput').value = "";
            }
        };

        function updateChart(dataList) {
            const labels = dataList.map(d => d.date);
            const data = dataList.map(d => d.weight);
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '個人體重趨勢',
                        data: data,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true
                    }]
                }
            });
        }
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: #4f46e5; color: white; padding: 12px 24px; width: 100%; font-size: 1rem; }
        .btn-add { background: #10b981; color: white; padding: 10px; }
        .btn-logout { background: #ef4444; color: white; padding: 5px 10px; font-size: 0.8rem; margin-top: 10px; }
        input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        #loginSection { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <div id="loginSection" class="card">
        <h2>⚖️ 體重追蹤 APP</h2>
        <p>請先登入以同步您的私密數據</p>
        <button class="btn-primary" onclick="login()">使用 Google 帳號登入</button>
    </div>

    <div id="appSection" style="display:none; width: 100%; max-width: 500px;">
        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span id="userName" style="font-weight:bold;"></span>
                <button class="btn-logout" onclick="logout()">登出</button>
            </div>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <div style="display:flex; gap: 10px;">
                <input type="date" id="dateInput">
                <input type="number" id="weightInput" placeholder="kg" style="width: 80px;">
                <button class="btn-add" onclick="addWeight()">記錄</button>
            </div>
        </div>

        <div class="card">
            <canvas id="weightChart"></canvas>
        </div>
    </div>

</body>
</html>
