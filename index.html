<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端體重追蹤 APP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 這裡就是你提供的金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDqjGj7I-ZqDQfeayB-MjdG3XVJgoUOInI",
            authDomain: "weight-byrealcat.firebaseapp.com",
            projectId: "weight-byrealcat",
            storageBucket: "weight-byrealcat.firebasestorage.app",
            messagingSenderId: "922031190428",
            appId: "1:922031190428:web:e7cee391951b5d5e091859",
            measurementId: "G-E6V3XJQXXW"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const weightCol = collection(db, "weights");

        // 圖表變數
        let chartInstance = null;

        // 設定今天的日期為預設值
        document.getElementById('dateInput').valueAsDate = new Date();

        // 監聽資料庫變化 (即時更新)
        const q = query(weightCol, orderBy("date", "asc"));
        onSnapshot(q, (snapshot) => {
            const weights = [];
            snapshot.forEach((doc) => weights.push(doc.data()));
            updateChart(weights);
        });

        // 新增資料到雲端
        window.addWeight = async function() {
            const date = document.getElementById('dateInput').value;
            const weight = parseFloat(document.getElementById('weightInput').value);

            if (!date || isNaN(weight)) {
                alert("請輸入完整的日期與體重！");
                return;
            }

            try {
                await addDoc(weightCol, { date, weight, createdAt: new Date() });
                document.getElementById('weightInput').value = ""; // 清空輸入框
            } catch (e) {
                console.error("增加紀錄出錯: ", e);
            }
        };

        function updateChart(dataList) {
            const labels = dataList.map(d => d.date);
            const data = dataList.map(d => d.weight);
            const ctx = document.getElementById('weightChart').getContext('2d');
            
            if (chartInstance) { chartInstance.destroy(); }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '雲端同步體重 (kg)',
                        data: data,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                }
            });
        }
    </script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { color: #1e293b; text-align: center; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        button { padding: 10px 20px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2563eb; }
        .status { text-align: center; font-size: 0.8rem; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>⚖️ 雲端體重追蹤器</h1>

    <div class="card">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="number" id="weightInput" placeholder="kg" step="0.1">
            <button onclick="addWeight()">新增</button>
        </div>
        <p class="status">✨ 資料將即時同步至雲端資料庫</p>
    </div>

    <div class="card">
        <canvas id="weightChart"></canvas>
    </div>

</body>
</html>
